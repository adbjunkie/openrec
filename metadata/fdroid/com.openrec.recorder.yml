AutoName: OpenRec
Description: |-
  OpenRec is a minimal, open-source background video recorder.

  Privacy first: no analytics, no network, no cloud. Videos stay on your device.

  Record in the background with front or back camera and optional audio. Change the
  launcher icon for discretion and use minimal notification mode where Android allows.

  You are responsible for complying with local recording consent laws.

